    // Manages professional contacts, tracks relationship strength,
    // logs outreach activities, and cross-references with Node Map
    // and Job Scanner data. Premium feature (shown with upgrade CTA
    // for free users).
    // ============================================================

    const CONTACT_CATEGORIES = [
      { id: 'client', label: 'Client', color: '#2d6a4f', icon: '💼' },
      { id: 'employer', label: 'Employer', color: '#5c7cfa', icon: '🏢' },
      { id: 'advisor', label: 'Advisor', color: '#ff6b35', icon: '🧠' },
      { id: 'referral', label: 'Referral', color: '#f4a261', icon: '🤝' },
      { id: 'mentor', label: 'Mentor', color: '#2a9d8f', icon: '🎓' },
      { id: 'peer', label: 'Peer', color: '#7c3aed', icon: '👥' },
      { id: 'dormant', label: 'Dormant', color: '#666', icon: '💤' },
    ];

    const MiniCRMView = () => {
      const { data, updateData } = useApp();
      const contacts = data.crm?.contacts || [];
      const activities = data.crm?.activities || [];
      const nodeMapContacts = data.nodeMap?.nodes || [];
      const [showForm, setShowForm] = useState(false);
      const [filter, setFilter] = useState('all');
      const [newContact, setNewContact] = useState({
        name: '', email: '', company: '', title: '', category: 'peer', strength: 3, lastContact: '', notes: '', tags: ''
      });

      // Import from Node Map
      const importFromNodeMap = () => {
        const existing = new Set(contacts.map(c => c.name.toLowerCase()));
        const newContacts = nodeMapContacts
          .filter(n => !existing.has((n.name || '').toLowerCase()) && n.name)
          .map(n => ({
            id: Date.now() + Math.random(),
            name: n.name,
            email: n.email || '',
            company: n.company || n.organization || '',
            title: n.title || n.role || '',
            category: n.category || 'peer',
            strength: n.strength || 3,
            lastContact: '',
            notes: n.notes || '',
            tags: (n.tags || []).join(', '),
            importedFrom: 'node-map',
          }));
        if (newContacts.length > 0) {
          updateData('crm.contacts', [...contacts, ...newContacts]);
        }
        return newContacts.length;
      };

      const addContact = () => {
        if (!newContact.name.trim()) return;
        updateData('crm.contacts', [...contacts, {
          ...newContact,
          id: Date.now(),
          createdAt: new Date().toISOString(),
          tags: newContact.tags.split(',').map(t => t.trim()).filter(Boolean),
        }]);
        setNewContact({ name: '', email: '', company: '', title: '', category: 'peer', strength: 3, lastContact: '', notes: '', tags: '' });
        setShowForm(false);
      };

      const deleteContact = (id) => {
        updateData('crm.contacts', contacts.filter(c => c.id !== id));
      };

      // Filter contacts
      const filtered = filter === 'all' ? contacts : contacts.filter(c => c.category === filter);

      // Stats
      const totalContacts = contacts.length;
      const byCategory = {};
      CONTACT_CATEGORIES.forEach(cat => { byCategory[cat.id] = contacts.filter(c => c.category === cat.id).length; });
      const dormantCount = contacts.filter(c => {
        if (!c.lastContact) return true;
        const daysSince = (Date.now() - new Date(c.lastContact).getTime()) / (1000 * 60 * 60 * 24);
        return daysSince > 90;
      }).length;

      return (
        <div className="fade-in space-y-6">
          <div className="glass-card p-6 glow">
            <div className="flex items-start justify-between">
              <div>
                <h1 className="text-2xl font-bold text-white">Mini-CRM</h1>
                <p className="text-gray-400 text-sm mt-1">Manage relationships, track outreach, and never lose a warm connection.</p>
              </div>
              <div className="flex gap-2">
                {nodeMapContacts.length > 0 && (
                  <button onClick={() => { const count = importFromNodeMap(); if (count > 0) alert(`Imported ${count} contacts from Node Map`); else alert('All Node Map contacts already imported'); }}
                    className="px-3 py-2 rounded-lg glass text-xs text-gray-400 hover:text-white transition-all">
                    Import from Node Map ({nodeMapContacts.length})
                  </button>
                )}
                <button onClick={() => setShowForm(!showForm)}
                  className="px-4 py-2 rounded-xl font-bold text-sm text-white transition-all hover:scale-105"
                  style={{ background: 'linear-gradient(135deg, #ff6b35, #e63946)' }}>
                  + Add Contact
                </button>
              </div>
            </div>
          </div>

          {/* Stats row */}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2">
            <button onClick={() => setFilter('all')}
              className={`glass rounded-xl p-3 text-center transition-all ${filter === 'all' ? 'ring-1 ring-brand-500' : ''}`}>
              <p className="text-lg font-bold text-white">{totalContacts}</p>
              <p className="text-[9px] text-gray-500 uppercase">Total</p>
            </button>
            {CONTACT_CATEGORIES.map(cat => (
              <button key={cat.id} onClick={() => setFilter(cat.id)}
                className={`glass rounded-xl p-3 text-center transition-all ${filter === cat.id ? 'ring-1' : ''}`}
                style={filter === cat.id ? { borderColor: cat.color } : {}}>
                <p className="text-lg font-bold" style={{ color: cat.color }}>{byCategory[cat.id] || 0}</p>
                <p className="text-[9px] text-gray-500 uppercase">{cat.icon} {cat.label}</p>
              </button>
            ))}
          </div>

          {/* Dormant alert */}
          {dormantCount > 0 && (
            <div className="glass rounded-xl p-3 flex items-center gap-3" style={{ borderColor: '#f4a26130', borderWidth: '1px' }}>
              <span className="text-sm">⚠️</span>
              <p className="text-xs text-gray-400">
                <strong className="text-yellow-400">{dormantCount} contacts</strong> haven't been reached in 90+ days.
                {' '}<button onClick={() => setFilter('dormant')} className="text-yellow-400 underline">View dormant</button>
              </p>
            </div>
          )}

          {/* Add contact form */}
          {showForm && (
            <div className="glass-card p-6">
              <h3 className="text-sm font-bold text-white mb-3">Add New Contact</h3>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <input type="text" value={newContact.name} onChange={e => setNewContact(p => ({...p, name: e.target.value}))} placeholder="Full name *" className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none" />
                <input type="email" value={newContact.email} onChange={e => setNewContact(p => ({...p, email: e.target.value}))} placeholder="Email" className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none" />
                <input type="text" value={newContact.company} onChange={e => setNewContact(p => ({...p, company: e.target.value}))} placeholder="Company" className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none" />
                <input type="text" value={newContact.title} onChange={e => setNewContact(p => ({...p, title: e.target.value}))} placeholder="Title / Role" className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none" />
                <select value={newContact.category} onChange={e => setNewContact(p => ({...p, category: e.target.value}))} className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white outline-none">
                  {CONTACT_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
                </select>
                <div className="flex items-center gap-2">
                  <label className="text-xs text-gray-400 w-24">Strength: {newContact.strength}</label>
                  <input type="range" min="1" max="5" value={newContact.strength} onChange={e => setNewContact(p => ({...p, strength: parseInt(e.target.value)}))} className="flex-1" />
                </div>
                <input type="date" value={newContact.lastContact} onChange={e => setNewContact(p => ({...p, lastContact: e.target.value}))} className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white outline-none" />
                <input type="text" value={newContact.tags} onChange={e => setNewContact(p => ({...p, tags: e.target.value}))} placeholder="Tags (comma-separated)" className="px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none" />
                <textarea value={newContact.notes} onChange={e => setNewContact(p => ({...p, notes: e.target.value}))} placeholder="Notes..." rows={2} className="col-span-2 px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 outline-none resize-none" />
              </div>
              <div className="flex gap-2">
                <Button onClick={addContact}>Save Contact</Button>
                <button onClick={() => setShowForm(false)} className="px-4 py-2 rounded-xl text-sm text-gray-500 hover:text-white">Cancel</button>
              </div>
            </div>
          )}

          {/* Contact list */}
          {filtered.length > 0 ? (
            <div className="space-y-2">
              {filtered.map(contact => {
                const cat = CONTACT_CATEGORIES.find(c => c.id === contact.category) || CONTACT_CATEGORIES[5];
                const daysSinceContact = contact.lastContact
                  ? Math.round((Date.now() - new Date(contact.lastContact).getTime()) / (1000 * 60 * 60 * 24))
                  : null;
                const isDormant = daysSinceContact === null || daysSinceContact > 90;
                return (
                  <div key={contact.id} className="glass-card p-4 flex items-center gap-4">
                    {/* Avatar */}
                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0"
                      style={{ background: `${cat.color}20`, color: cat.color }}>
                      {(contact.name || '?')[0].toUpperCase()}
                    </div>
                    {/* Info */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <p className="text-sm font-bold text-white truncate">{contact.name}</p>
                        <span className="px-1.5 py-0.5 rounded text-[8px] font-bold uppercase" style={{ background: `${cat.color}20`, color: cat.color }}>{cat.label}</span>
                        {isDormant && <span className="px-1.5 py-0.5 rounded text-[8px] font-bold uppercase bg-yellow-500/10 text-yellow-400">dormant</span>}
                      </div>
                      <p className="text-xs text-gray-400 truncate">
                        {contact.title}{contact.title && contact.company ? ' at ' : ''}{contact.company}
                      </p>
                    </div>
                    {/* Strength dots */}
                    <div className="flex gap-0.5 flex-shrink-0">
                      {[1,2,3,4,5].map(n => (
                        <div key={n} className={`w-2 h-2 rounded-full ${n <= (contact.strength || 0) ? '' : 'bg-gray-700'}`}
                          style={n <= (contact.strength || 0) ? { background: cat.color } : {}} />
                      ))}
                    </div>
                    {/* Last contact */}
                    <div className="text-right flex-shrink-0 w-20">
                      {daysSinceContact !== null ? (
                        <p className={`text-[10px] font-medium ${daysSinceContact > 90 ? 'text-yellow-400' : daysSinceContact > 30 ? 'text-gray-400' : 'text-green-400'}`}>
                          {daysSinceContact}d ago
                        </p>
                      ) : (
                        <p className="text-[10px] text-gray-600">Never</p>
                      )}
                    </div>
                    {/* Delete */}
                    <button onClick={() => deleteContact(contact.id)} className="text-gray-600 hover:text-red-400 text-xs flex-shrink-0">✕</button>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="glass-card p-8 text-center">
              <span className="text-3xl block mb-3">📇</span>
              <p className="text-sm text-gray-400 mb-2">
                {filter === 'all' ? 'No contacts yet. Add your first contact or import from Node Map.' : `No ${filter} contacts.`}
              </p>
              <button onClick={() => setShowForm(true)} className="text-xs text-brand-400 hover:text-brand-300">+ Add your first contact</button>
            </div>
          )}
        </div>
      );
    };

    // ============================================================
    // PROGRESS & STREAKS VIEW
    // ============================================================

    const ProgressView = () => {
      const { data, setActiveView } = useApp();
      const { streaks } = data;

      // Use the cross-tool engine to get status for ALL 23 tools
      const toolStatuses = useMemo(() => getToolCompletionStatus(data), [data]);
      const completedTools = toolStatuses.filter(t => t.done).length;
      const totalTools = toolStatuses.length;
      const completionPct = Math.round((completedTools / totalTools) * 100);

      // Beast Mode level based on completion
      const getBeastLevel = () => {
        if (completionPct >= 90) return { label: 'BEAST MODE', color: '#2d6a4f', desc: 'You have mastered your AI Wage Gap toolkit.' };
        if (completionPct >= 70) return { label: 'Power User', color: '#5c7cfa', desc: 'Outstanding progress. Push through to Beast Mode.' };
        if (completionPct >= 50) return { label: 'Rising Strong', color: '#f4a261', desc: 'Halfway there. Momentum is building.' };
        if (completionPct >= 25) return { label: 'Getting Started', color: '#ff6b35', desc: 'Good start. Keep the momentum going.' };
        return { label: 'Just Beginning', color: '#e63946', desc: 'Your journey starts now. Take the first step.' };
      };
      const beastLevel = getBeastLevel();

      return (
        <div className="fade-in space-y-6">
          <SectionHeader title="Progress & Streaks" subtitle="Your complete Beast Mode journey tracker" />

          {/* ===== STREAK + BEAST LEVEL ===== */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {/* Streak card */}
            <div className="glass-card p-6 text-center glow-orange">
              <p className="text-beast-orange text-3xl mb-1">🔥</p>
              <p className="text-4xl font-black text-white">{streaks.currentStreak}</p>
              <p className="text-sm text-gray-400 mt-1">Day Streak</p>
              <div className="flex justify-center gap-8 mt-4">
                <div><p className="text-lg font-bold text-brand-400">{streaks.longestStreak}</p><p className="text-xs text-gray-500">Longest</p></div>
                <div><p className="text-lg font-bold text-brand-400">{streaks.totalVisits}</p><p className="text-xs text-gray-500">Total Visits</p></div>
              </div>
            </div>
            {/* Beast level card */}
            <div className="glass-card p-6 text-center" style={{ borderColor: `${beastLevel.color}40` }}>
              <div className="relative inline-flex items-center justify-center mb-3">
                <ScoreRing score={completedTools} maxScore={totalTools} size={110} strokeWidth={8} color={beastLevel.color} />
              </div>
              <h2 className="text-xl font-bold" style={{ color: beastLevel.color }}>{beastLevel.label}</h2>
              <p className="text-xs text-gray-400 mt-1">{beastLevel.desc}</p>
              <p className="text-sm text-gray-300 mt-3 font-medium">{completedTools} of {totalTools} tools completed ({completionPct}%)</p>
            </div>
          </div>

          {/* ===== OVERALL PROGRESS BAR ===== */}
          <div className="glass-card p-6">
            <div className="flex items-center justify-between mb-3">
              <p className="text-sm font-medium text-white">Overall Tool Completion</p>
              <p className="text-sm font-bold" style={{ color: beastLevel.color }}>{completedTools}/{totalTools}</p>
            </div>
            <ProgressBar value={completedTools} max={totalTools} color={beastLevel.color} height={10} />
          </div>

          {/* ===== SECTION-BY-SECTION BREAKDOWN ===== */}
          <div className="glass-card p-6">
            <SectionHeader title="Tool Completion by Section" subtitle="Click any tool to open it" />
            <div className="space-y-5">
              {TOOL_SECTIONS.map(section => {
                const sectionTools = toolStatuses.filter(t => t.section === section.id);
                const sectionDone = sectionTools.filter(t => t.done).length;
                const sectionPct = Math.round((sectionDone / sectionTools.length) * 100);
                return (
                  <div key={section.id}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full" style={{ background: section.color }} />
                        <p className="text-xs font-bold uppercase tracking-wider" style={{ color: section.color }}>{section.label}</p>
                      </div>
                      <span className="text-xs text-gray-400">{sectionDone}/{sectionTools.length} — {sectionPct}%</span>
                    </div>
                    <ProgressBar value={sectionDone} max={sectionTools.length} color={section.color} height={6} />
                    <div className="space-y-1 mt-2">
                      {sectionTools.map(tool => (
                        <button key={tool.id} onClick={() => setActiveView(tool.id)}
                          className="w-full flex items-center gap-3 rounded-lg p-2 hover:bg-white/5 transition-all text-left">
                          <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${tool.done ? 'text-white' : 'border border-gray-600 text-gray-600'}`}
                            style={tool.done ? { background: tool.color } : {}}>
                            {tool.done ? '✓' : '○'}
                          </div>
                          <span className={`text-sm flex-1 ${tool.done ? 'text-white' : 'text-gray-500'}`}>{tool.name}</span>
                          <span className="text-[10px] text-gray-500 flex-shrink-0">{tool.done ? tool.metric : '—'}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ===== DATA EXPORT/IMPORT ===== */}
          <div className="glass-card p-6">
            <p className="text-sm font-medium text-white mb-3">Export / Import Data</p>
            <div className="flex gap-3">
              <Button variant="secondary" size="sm" onClick={() => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `career-beast-mode-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click(); URL.revokeObjectURL(url);
              }}>Export Data (JSON)</Button>
              <Button variant="secondary" size="sm" onClick={() => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = '.json';
                input.onchange = (e) => {
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    try {
                      const imported = JSON.parse(ev.target.result);
                      localStorage.setItem(STORAGE_KEY, JSON.stringify(imported));
                      window.location.reload();
                    } catch { alert('Invalid JSON file'); }
                  };
                  reader.readAsText(e.target.files[0]);
                };
                input.click();
              }}>Import Data</Button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // PDF REPORT GENERATOR
    // ============================================================

    const PDFReport = ({ onClose }) => {
      const { data } = useApp();
      const reportRef = useRef(null);
      const track = data.journey?.track || 'operator';

      const currentScore = calculateTotalScore(data.scorecard?.answers || {});
      const potentialScore = calculateTotalScore(data.scorecard?.potentialAnswers || {});
      const scoreLevel = getScoreLevel(currentScore);
      const hasScorecard = Object.keys(data.scorecard?.answers || {}).length > 0;
      const toolStatuses = getToolCompletionStatus(data);
      const completedTools = toolStatuses.filter(t => t.done).length;
      const totalTools = toolStatuses.length;
      const beastData = calculateBeastScore(data);
      const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      const handlePrint = () => {
        window.print();
      };

      return (
        <div className="fixed inset-0 z-50 bg-black/80 flex items-start justify-center overflow-y-auto p-4">
          {/* Print controls — hidden during print */}
          <div className="no-print fixed top-4 right-4 z-50 flex gap-2">
            <button onClick={handlePrint}
              className="px-6 py-3 rounded-xl font-bold text-white text-sm transition-all hover:scale-105"
              style={{ background: 'linear-gradient(135deg, #5c7cfa, #4c6ef5)' }}>
              Print / Save as PDF
            </button>
            <button onClick={onClose}
              className="px-4 py-3 rounded-xl font-bold text-white text-sm bg-gray-700 hover:bg-gray-600 transition-all">
              ✕ Close
            </button>
          </div>

          {/* Printable report */}
          <div ref={reportRef} className="print-report bg-white text-gray-900 max-w-[800px] w-full rounded-2xl p-10 my-16 shadow-2xl"
            style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>

            {/* Header */}
            <div style={{ borderBottom: '3px solid #5c7cfa', paddingBottom: '16px', marginBottom: '24px' }}>
              <h1 style={{ fontSize: '26px', fontWeight: 800, color: '#111', margin: 0 }}>
                Career Beast Mode — AI Wage Gap Report
              </h1>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '8px' }}>
                <span style={{ color: '#666', fontSize: '13px' }}>
                  {data.user?.name || 'User'} | {data.user?.role || ''} | {data.user?.industry || ''} | {track === 'operator' ? 'AI Champion Track' : 'Founder Track'}
                </span>
                <span style={{ color: '#666', fontSize: '13px' }}>Generated: {today}</span>
              </div>
            </div>

            {/* Overall Score */}
            {hasScorecard && (
              <div style={{ textAlign: 'center', padding: '20px 0', marginBottom: '20px' }}>
                <div style={{ display: 'inline-block', padding: '12px 40px', borderRadius: '16px', background: `${scoreLevel.color}15`, border: `2px solid ${scoreLevel.color}` }}>
                  <div style={{ fontSize: '48px', fontWeight: 900, color: scoreLevel.color }}>{currentScore}</div>
                  <div style={{ fontSize: '14px', color: '#666' }}>out of 100</div>
                  <div style={{ fontSize: '18px', fontWeight: 700, color: scoreLevel.color, marginTop: '4px' }}>{scoreLevel.label}</div>
                </div>
                {potentialScore > 0 && (
                  <div style={{ marginTop: '12px', fontSize: '13px', color: '#888' }}>
                    Potential Score: <strong style={{ color: '#5c7cfa' }}>{potentialScore}</strong> | Gap to Close: <strong style={{ color: '#ff6b35' }}>{potentialScore - currentScore} pts</strong>
                  </div>
                )}
              </div>
            )}

            {/* Dimension Breakdown */}
            {hasScorecard && (
              <div>
                <h2 style={{ fontSize: '16px', fontWeight: 700, color: '#333', borderBottom: '2px solid #5c7cfa', paddingBottom: '4px', marginBottom: '12px' }}>
                  5-Dimension Breakdown
                </h2>
                {SCORECARD_DIMENSIONS.map(dim => {
                  const score = calculateDimensionScore(dim, data.scorecard.answers);
                  const pct = Math.round((score / 20) * 100);
                  const level = getDimensionLevel(score);
                  return (
                    <div key={dim.id} style={{ marginBottom: '10px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '3px' }}>
                        <span style={{ fontWeight: 600, color: '#333' }}>{dim.name}</span>
                        <span style={{ color: level.color, fontWeight: 700 }}>{score}/20 — {level.label}</span>
                      </div>
                      <div className="print-bar">
                        <div className="print-bar-fill" style={{ width: `${pct}%`, background: dim.color }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Beast Score — composite career readiness index */}
            <div style={{ textAlign: 'center', padding: '20px 0', marginBottom: '8px', marginTop: '20px' }}>
              <h2 style={{ fontSize: '16px', fontWeight: 700, color: '#333', borderBottom: '2px solid #ff6b35', paddingBottom: '4px', marginBottom: '16px' }}>
                Beast Score — Career Readiness Index
              </h2>
              <div style={{ display: 'inline-block', padding: '12px 40px', borderRadius: '16px', background: `${beastData.level.color}15`, border: `2px solid ${beastData.level.color}` }}>
                <div style={{ fontSize: '42px', fontWeight: 900, color: beastData.level.color }}>{beastData.beastScore}</div>
                <div style={{ fontSize: '14px', color: '#666' }}>out of 100</div>
                <div style={{ fontSize: '16px', fontWeight: 700, color: beastData.level.color, marginTop: '4px' }}>{beastData.level.label}</div>
              </div>
              <div style={{ marginTop: '8px', fontSize: '12px', color: '#888' }}>
                Track: {track === 'operator' ? 'AI Champion (Operator)' : 'Builder / Founder'}
              </div>
            </div>

            {/* Beast Score Dimensions */}
            <div style={{ marginBottom: '20px' }}>
              {BEAST_SCORE_DIMENSIONS.map(dim => {
                const dimScore = beastData.dimensions[dim.id] || 0;
                const pct = Math.round(dimScore);
                const dimLevel = getScoreLevel(dimScore);
                return (
                  <div key={dim.id} style={{ marginBottom: '8px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '3px' }}>
                      <span style={{ fontWeight: 600, color: '#333' }}>{dim.name} ({Math.round(dim.weight * 100)}% weight)</span>
                      <span style={{ color: dimLevel.color, fontWeight: 700 }}>{dimScore}/100 — {dimLevel.label}</span>
                    </div>
                    <div className="print-bar">
                      <div className="print-bar-fill" style={{ width: `${pct}%`, background: dim.color }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Journey Progress — 6 phases */}
            <h2 style={{ fontSize: '16px', fontWeight: 700, color: '#333', borderBottom: '2px solid #5c7cfa', paddingBottom: '4px', marginBottom: '12px' }}>
              Journey Progress — 6 Phases
            </h2>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '11px', marginBottom: '20px' }}>
              <thead>
                <tr style={{ background: '#f5f5f5' }}>

    const CommandPalette = ({ isOpen, onClose }) => {
      const { setActiveView } = useApp();
      const [query, setQuery] = useState('');
      const inputRef = useRef(null);

      // All navigable items — tools + special views
      const allItems = useMemo(() => {
        const items = NAV_ITEMS.filter(n => n.id !== 'home-divider').map(n => ({
          id: n.id, name: n.label, icon: n.icon || '◆', section: n.section || ''
        }));
        return items;
      }, []);

      // Filter by query
      const filtered = useMemo(() => {
        if (!query.trim()) return allItems.slice(0, 12); // Show first 12 when empty
        const q = query.toLowerCase();
        return allItems.filter(item =>
          item.name.toLowerCase().includes(q) || item.section.toLowerCase().includes(q)
        ).slice(0, 10);
      }, [query, allItems]);

      // Focus input on open
      useEffect(() => {
        if (isOpen && inputRef.current) {
          inputRef.current.focus();
          setQuery('');
        }
      }, [isOpen]);

      // Handle selection
      const handleSelect = (id) => {
        setActiveView(id);
        onClose();
      };

      // Keyboard nav
      const [selectedIdx, setSelectedIdx] = useState(0);
      useEffect(() => { setSelectedIdx(0); }, [query]);

      const handleKeyDown = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, filtered.length - 1)); }
        if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, 0)); }
        if (e.key === 'Enter' && filtered[selectedIdx]) { handleSelect(filtered[selectedIdx].id); }
        if (e.key === 'Escape') { onClose(); }
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center pt-[15vh]" onClick={onClose}>
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" />
          <div className="relative w-full max-w-lg mx-4 glass-card rounded-2xl overflow-hidden shadow-2xl"
            onClick={e => e.stopPropagation()} style={{ border: '1px solid rgba(92,124,250,0.3)' }}>

            <div className="flex items-center gap-3 px-5 py-4 border-b border-white/10">
              <span className="text-gray-500 text-lg">⌘</span>

                className="flex-1 bg-transparent text-white text-base outline-none placeholder-gray-500" />
              <kbd className="text-[10px] text-gray-500 bg-white/5 px-2 py-0.5 rounded">ESC</kbd>
            </div>
            {/* Results */}

              {filtered.length === 0 && (
                <div className="text-center text-gray-500 text-sm py-8">No tools found for "{query}"</div>
              )}
              {filtered.map((item, i) => (
                <button key={item.id} onClick={() => handleSelect(item.id)}
                  onMouseEnter={() => setSelectedIdx(i)}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all ${
                    i === selectedIdx ? 'bg-brand-500/15 text-white' : 'text-gray-400 hover:bg-white/5'
                  }`}>
                  <span className="w-7 h-7 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
                    style={i === selectedIdx ? { background: 'rgba(92,124,250,0.2)', color: '#5c7cfa' } : { background: 'rgba(255,255,255,0.03)' }}>
                    {item.icon}
                  </span>
                  <div className="flex-1 min-w-0">
                    <p className={`text-sm font-medium truncate ${i === selectedIdx ? 'text-white' : ''}`}>{item.name}</p>

                </button>

            </div>

        </div>
      );

            <button onClick={() => setShowPalette(true)} className="text-gray-400 text-sm p-1">⌘K</button>
          </div>

          {/* Sidebar — slide-in on mobile */}
          <div id="mobile-sidebar" className="lg:translate-x-0 -translate-x-full fixed lg:relative z-40 transition-transform duration-300">
            <Sidebar />
          </div>
          {/* Mobile sidebar backdrop */}
          <div className="lg:hidden fixed inset-0 z-30 bg-black/50 hidden" id="sidebar-backdrop"
            onClick={() => document.getElementById('mobile-sidebar')?.classList.remove('translate-x-0')} />

          <main className="flex-1 overflow-y-auto p-4 pt-16 lg:pt-6 lg:p-8">
            <div className="max-w-6xl mx-auto">
              <ActiveComponent />
              {/* Export Report button — only on dashboard */}
              {activeView === 'dashboard' && (
                <div className="mt-6 text-center no-print">
                  <button onClick={() => setShowReport(true)}
                    className="px-6 py-3 rounded-xl font-bold text-white text-sm transition-all hover:scale-105"
                    style={{ background: 'linear-gradient(135deg, #5c7cfa, #4c6ef5)' }}>
                    Export PDF Report
                  </button>
                </div>
              )}
            </div>
          </main>

          {/* Command Palette overlay */}
          <CommandPalette isOpen={showPalette} onClose={() => setShowPalette(false)} />
          {/* PDF Report overlay */}
          {showReport && <PDFReport onClose={() => setShowReport(false)} />}
          {/* Phase unlock celebration */}
          {celebratePhase && (
            <PhaseUnlockCelebration
              phase={celebratePhase}
              beastScore={calculateBeastScore(data).beastScore}
              onClose={() => setCelebratePhase(null)}
            />
          )}
          {/* Login / Upgrade modal */}
          {showLoginModal && (
            <LoginModal
              mode={loginModalMode}
              onClose={() => setShowLoginModal(false)}
            />
          )}
        </div>
      );
    };

    // ============================================================
    // RENDER
    // ============================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      React.createElement(AppProvider, null,
        React.createElement(App)
      )
    );

    // Hide splash screen once React has mounted
    requestAnimationFrame(() => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hide');
        // Remove from DOM after transition
        setTimeout(() => { if (splash) splash.remove(); }, 600);
      }, 400); // Brief delay so user sees the branded loading screen
    });
  </script>
</body>
</html>
