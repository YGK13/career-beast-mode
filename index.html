    @media print {

      .glass, .glass-card { background: #fff !important; backdrop-filter: none !important; border: 1px solid #ddd !important; box-shadow: none !important; }
      .glow, .glow-orange { box-shadow: none !important; }
      nav, aside, .sidebar { display: none !important; }
      main { padding: 0 !important; margin: 0 !important; }
      .print-report { display: block !important; }
      .print-report h1 { color: #111; font-size: 22pt; }
      .print-report h2 { color: #333; font-size: 14pt; border-bottom: 2px solid #5c7cfa; padding-bottom: 4px; margin-top: 20px; }
      .print-report h3 { color: #444; font-size: 12pt; }
      .print-report .score-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; }
      .print-report table { width: 100%; border-collapse: collapse; margin: 10px 0; }
      .print-report th, .print-report td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 10pt; }

    /* ===== LOADING SPLASH SCREEN ===== */
    #splash {

      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);

          totalWeight += q.weight;
          // Normalize answer to 0-20 scale
          const normalized = (answer / 100) * 20;
          weightedSum += normalized * q.weight;
        }
      });

      if (totalWeight === 0) return 0;
      return Math.round((weightedSum / totalWeight) * 10) / 10;
    };

    // Calculate Beast Score from tool completion data
    // Returns { beastScore, dimensions: { ai_readiness: score, ... }, level }
    const calculateBeastScore = (data) => {
      const toolStatuses = getToolCompletionStatus(data);
      const toolMap = {};
      toolStatuses.forEach(t => { toolMap[t.id] = t; });

      const dimensions = {};
      let total = 0;

      BEAST_SCORE_DIMENSIONS.forEach(dim => {
        // Get completed tools in this dimension
        const dimTools = dim.toolIds.map(id => toolMap[id]).filter(Boolean);
        const completedTools = dimTools.filter(t => t.done);

        if (completedTools.length === 0) {
          dimensions[dim.id] = 0;
          return;
        }

        // Average score of completed tools (each tool.score is 0-100)
        const avgScore = completedTools.reduce((sum, t) => sum + (t.score || 0), 0) / completedTools.length;

        // Completion multiplier: need 60% of tools done for full credit
        const completionRatio = completedTools.length / (dimTools.length * 0.6);
        const multiplier = Math.min(1.0, completionRatio);

        const dimScore = Math.round(avgScore * multiplier);
        dimensions[dim.id] = dimScore;
        total += dimScore * dim.weight;
      });

      const beastScore = Math.round(total);
      const level = getScoreLevel(beastScore);

      return { beastScore, dimensions, level };
    };

    // Generate track-specific recommendations based on Beast Score dimensions
    // Returns array of { priority, icon, title, text, actions, dimId, dimScore }
    const generateTrackRecommendations = (beastData, track, data) => {
      const recs = [];
      const trackRecs = TRACK_RECOMMENDATIONS[track] || TRACK_RECOMMENDATIONS.operator;

      BEAST_SCORE_DIMENSIONS.forEach(dim => {
        const dimScore = beastData.dimensions[dim.id] || 0;
        const dimRecs = trackRecs[dim.id] || [];

        // Find the matching recommendation (first one where score is below threshold)
        for (const rec of dimRecs) {
          if (dimScore < rec.threshold) {
            recs.push({ ...rec, dimId: dim.id, dimScore, dimName: dim.name, dimColor: dim.color });
            break; // Only one rec per dimension
          }
        }
      });

      // Sort: critical first, then action, then growth
      const priorityOrder = { critical: 0, action: 1, growth: 2 };
      recs.sort((a, b) => (priorityOrder[a.priority] || 3) - (priorityOrder[b.priority] || 3));

      // Return top 3 most important
      return recs.slice(0, 3);
    };

      return phase.tools[track] || phase.tools.operator;

      const phase = JOURNEY_PHASES.find(p => p.id === phaseId);

      const prevPhase = JOURNEY_PHASES.find(p => p.id === phaseId - 1);
      if (!prevPhase) return true;

      const track = data.journey?.track || 'operator';
      const prevToolIds = getPhaseTools(prevPhase.id, track);
      const toolStatuses = getToolCompletionStatus(data);
      const toolMap = {};
      toolStatuses.forEach(t => { toolMap[t.id] = t; });

      const completedInPrev = prevToolIds.filter(id => toolMap[id]?.done).length;
      return completedInPrev >= phase.gate;
    };

            {/* Journey Phases — collapsible, with soft-gating */}
            {JOURNEY_PHASES.map(phase => {
              const unlocked = isPhaseUnlocked(phase.id, data);
              const phaseTools = getPhaseTools(phase.id, track);
              const progress = getPhaseProgress(phase.id, track, data);
              const isExpanded = expandedPhase === phase.id;

              return (
                <div key={phase.id} className="mb-1">
                  {/* Phase header — collapsible */}
                  <button onClick={() => {
                    if (!unlocked) return; // Don't expand locked phases
                    setExpandedPhase(isExpanded ? null : phase.id);
                  }}
                    className={`w-full text-left px-4 py-2 flex items-center gap-2 transition-all rounded-lg mx-1 ${
                      !unlocked ? 'opacity-40 cursor-not-allowed' : 'hover:bg-white/5 cursor-pointer'
                    }`}>
                    <span className="text-sm" style={{ color: unlocked ? phase.color : '#444' }}>{unlocked ? phase.icon : '🔒'}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5">
                        <span className={`text-[10px] font-bold uppercase tracking-wider ${unlocked ? '' : 'text-gray-600'}`}
                          style={unlocked ? { color: phase.color } : {}}>
                          Phase {phase.id}
                        </span>
                        <span className="text-[9px] text-gray-600">{progress.completed}/{progress.total}</span>
                      </div>
                      <p className={`text-xs truncate ${unlocked ? 'text-gray-300' : 'text-gray-600'}`}>{phase.name.split(': ')[1] || phase.name}</p>
                    </div>
                    <span className={`text-xs transition-transform ${isExpanded ? 'rotate-90' : ''} ${unlocked ? 'text-gray-500' : 'text-gray-700'}`}>▸</span>
                  </button>

                  {/* Phase tools — expanded view */}
                  {isExpanded && unlocked && (
                    <div className="ml-3 mt-1 mb-2">
                      {phaseTools.map(toolId => {
                        const nav = navLookup[toolId];
                        if (!nav) return null;
                        const toolStatuses = getToolCompletionStatus(data);
                        const toolStatus = toolStatuses.find(t => t.id === toolId);
                        const isDone = toolStatus?.done;

                        return (
                          <button key={toolId} onClick={() => setActiveView(toolId)}
                            className={`nav-item w-full text-left px-4 py-2 flex items-center gap-2.5 text-xs ${
                              activeView === toolId ? 'active text-white' : isDone ? 'text-gray-300' : 'text-gray-500'
                            }`}>
                            <span className={`w-4 text-center text-[10px] ${isDone ? 'text-green-400' : 'opacity-40'}`}>
                              {isDone ? '✓' : nav.icon}
                            </span>
                            <span className="truncate">{nav.label}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}

                  {/* Locked phase message */}
                  {!unlocked && expandedPhase === phase.id && (
                    <div className="mx-4 mt-1 mb-2 glass rounded-lg p-3 text-center">
                      <p className="text-xs text-gray-500">Complete {phase.gate} tools in Phase {phase.id - 1} to unlock</p>
                      <div className="mt-1 h-1.5 rounded-full bg-gray-800">
                        <div className="h-1.5 rounded-full transition-all" style={{
                          width: `${(getPhaseProgress(phase.id - 1, track, data).completed / phase.gate) * 100}%`,
                          background: JOURNEY_PHASES[phase.id - 2]?.color || '#5c7cfa'
                        }} />
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Extra nav sections — Learning Hub, AI Trainer, Progress */}
            <div className="mt-4 border-t border-white/5 pt-3">
              <p className="px-5 text-[10px] text-gray-600 uppercase tracking-widest mb-2">RESOURCES</p>
              <button onClick={() => setActiveView('career-assets')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'career-assets' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">📁</span>
                <span>Career Assets</span>
              </button>
              <button onClick={() => setActiveView('contact-import')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'contact-import' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">📥</span>
                <span>Contact Import</span>
              </button>
              <button onClick={() => setActiveView('mini-crm')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'mini-crm' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">📇</span>
                <span>Mini-CRM</span>
                <UpgradeBadge requiredTier="premium" />
              </button>
              <button onClick={() => setActiveView('ai-coach')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'ai-coach' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">🧠</span>
                <span>AI Coach</span>
              </button>
              <button onClick={() => setActiveView('learning-hub')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'learning-hub' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">📚</span>
                <span>Learning Hub</span>
              </button>
              <button onClick={() => setActiveView('ai-trainer')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'ai-trainer' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">💰</span>
                <span>Monetize as AI Trainer</span>
              </button>
              <button onClick={() => setActiveView('progress')}
                className={`nav-item w-full text-left px-5 py-2.5 flex items-center gap-3 text-sm ${activeView === 'progress' ? 'active text-white' : 'text-gray-400'}`}>
                <span className="w-5 text-center opacity-60">▲</span>
                <span>Progress & Streaks</span>
              </button>
            </div>
          </nav>

          {/* Track switcher + Footer */}
          <div className="p-4 border-t border-white/5 space-y-2">
            {/* Track indicator — clickable to switch */}
            <button onClick={() => {
              const newTrack = track === 'operator' ? 'founder' : 'operator';
              updateData('journey.track', newTrack);
            }}
              className="w-full glass rounded-lg p-2 flex items-center gap-2 hover:bg-white/5 transition-all text-left"
              title="Click to switch track">
              <span className="text-sm">{track === 'operator' ? '🏢' : '🚀'}</span>
              <div className="flex-1">
                <p className="text-[10px] text-gray-500 uppercase">Your Track</p>
                <p className="text-xs font-medium text-gray-300">{track === 'operator' ? 'AI Champion' : 'Builder / Founder'}</p>
              </div>
              <span className="text-[9px] text-gray-600">Switch ↔</span>
            </button>
            {/* Auth status / Sign in button */}
            {data.auth?.isAuthenticated ? (
              <div className="glass rounded-lg p-2 flex items-center gap-2">
                <div className="w-6 h-6 rounded-full bg-brand-500/20 flex items-center justify-center text-[10px] font-bold text-brand-400">
                  {(data.auth.user?.name || data.user.name || '?')[0].toUpperCase()}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-[10px] text-gray-400 truncate">{data.auth.user?.email || 'Signed in'}</p>
                  <p className="text-[9px] font-bold uppercase" style={{ color: SUBSCRIPTION_TIERS[data.auth.tier]?.color || '#666' }}>
                    {SUBSCRIPTION_TIERS[data.auth.tier]?.icon} {SUBSCRIPTION_TIERS[data.auth.tier]?.name || 'Free'}
                  </p>
                </div>
                {data.auth.tier === 'free' && (
                  <button onClick={() => { setLoginModalMode('pricing'); setShowLoginModal(true); }}
                    className="px-2 py-1 rounded text-[9px] font-bold text-beast-orange bg-beast-orange/10 hover:bg-beast-orange/20 transition-all">
                    Upgrade
                  </button>
                )}
              </div>
            ) : (
              <button onClick={() => { setLoginModalMode('login'); setShowLoginModal(true); }}
                className="w-full glass rounded-lg p-2.5 flex items-center justify-center gap-2 hover:bg-white/5 transition-all group">
                <span className="text-xs text-gray-400 group-hover:text-white">Sign in</span>
                <span className="text-[9px] text-beast-orange font-bold">→ Unlock Pro</span>
              </button>
            )}
            <div className="glass rounded-xl p-2">
              <p className="text-[10px] text-gray-500">v{APP_VERSION} — Data saved locally</p>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // ONBOARDING FLOW — hooks users in 60 seconds
    // ============================================================

    const OnboardingFlow = () => {
      const { data, updateData, setData } = useApp();
      // Steps: 0=welcome, 1=profile, 2=track selection, 3-7=mini-scorecard questions, 8=results
      const [step, setStep] = useState(0);
      const [name, setName] = useState(data.user.name || '');
      const [email, setEmail] = useState(data.user.email || '');
      const [role, setRole] = useState(data.user.role || '');
      const [industry, setIndustry] = useState(data.user.industry || '');
      const [selectedTrack, setSelectedTrack] = useState(null); // 'operator' | 'founder'
      const [miniAnswers, setMiniAnswers] = useState({});
      const [animateScore, setAnimateScore] = useState(false);
      const [show, setShow] = useState(true);

      // Initialize slider defaults when reaching slider questions (now steps 3-7)
      useEffect(() => {
        if (step >= 3 && step <= 7) {
          const q = MINI_SCORECARD[step - 3];
          if (q.type === 'slider' && miniAnswers[q.id] === undefined) {
            setMiniAnswers(prev => ({ ...prev, [q.id]: 50 }));
          }
        }
      }, [step]);

      // Fade transition between steps
      const fadeTo = useCallback((nextStep) => {
        setShow(false);
        setTimeout(() => {
          setStep(nextStep);
          setTimeout(() => setShow(true), 50);
        }, 300);
      }, []);

      // Calculate mini-score (quick estimate 0-100)
      const miniScore = useMemo(() => {
        let total = 0;
        let count = 0;
        MINI_SCORECARD.forEach(q => {
          const val = miniAnswers[q.id];
          if (val !== undefined) {
            // For exposure dimension, HIGH value = MORE risk = LOWER score contribution
            const normalized = q.dimIndex === 0 ? (100 - val) / 100 * 20 : val / 100 * 20;
            total += normalized;
            count++;
          }
        });
        // Extrapolate to 5 dimensions if not all answered
        return count > 0 ? Math.round((total / count) * 5) : 0;
      }, [miniAnswers]);

      // Finish onboarding — save profile, track, and mark complete
      const finishOnboarding = useCallback(() => {
        setData(prev => ({
          ...prev,
          onboardingComplete: true,
          user: { ...prev.user, name, email, role, industry },
          // Save track selection to journey state
          journey: {
            ...prev.journey,
            track: selectedTrack || 'operator', // Default to operator if somehow null
            currentPhase: 1,
            unlockedPhases: [1],
            completedPhases: [],
            phaseCompletions: {},
          },
          // Seed the full scorecard with mini answers so they don't start from zero
          scorecard: {
            ...prev.scorecard,
            answers: {
              ...prev.scorecard.answers,
              ...(miniAnswers.mini_exposure !== undefined ? { q1: miniAnswers.mini_exposure } : {}),
              ...(miniAnswers.mini_skills !== undefined ? { q5: miniAnswers.mini_skills } : {}),
              ...(miniAnswers.mini_experience !== undefined ? { q9: miniAnswers.mini_experience } : {}),
              ...(miniAnswers.mini_network !== undefined ? { q14: miniAnswers.mini_network } : {}),
              ...(miniAnswers.mini_income !== undefined ? { q17: miniAnswers.mini_income } : {})
            }
          }
        }));
      }, [name, email, role, industry, selectedTrack, miniAnswers, setData]);

      // Step 0: Welcome
      if (step === 0) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%)' }}>
            <div className={`max-w-lg w-full text-center transition-all duration-300 ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
              <div className="mb-8">
                <div className="w-20 h-20 rounded-2xl mx-auto mb-6 flex items-center justify-center text-4xl glow"
                  style={{ background: 'linear-gradient(135deg, #5c7cfa, #ff6b35)' }}>
                  ◆
                </div>
                <h1 className="text-4xl font-black text-white mb-3">Career <span className="gradient-text">Beast Mode</span></h1>
                <p className="text-lg text-gray-300 mb-2">Close Your AI Wage Gap</p>
                <p className="text-sm text-gray-500 max-w-md mx-auto leading-relaxed">
                  The AI revolution is creating a new wage gap. The professionals who master AI earn 2-10x more.
                  Find out where you stand in 60 seconds.
                </p>
              </div>
              <button onClick={() => fadeTo(1)}
                className="px-8 py-4 rounded-xl font-bold text-white text-lg transition-all hover:scale-105 active:scale-95 glow-orange"
                style={{ background: 'linear-gradient(135deg, #ff6b35, #e63946)' }}>
                Discover Your AI Wage Gap →
              </button>
              <p className="text-xs text-gray-600 mt-6">Free forever. Your data stays in your browser. Nothing is sent anywhere.</p>
            </div>
          </div>
        );
      }

      // Step 1: Profile capture
      if (step === 1) {
        const canProceed = name.trim().length > 0;
        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%)' }}>
            <div className={`max-w-md w-full transition-all duration-300 ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
              <div className="glass-card p-8">
                <div className="flex items-center gap-2 mb-6">
                  <div className="w-8 h-8 rounded-lg bg-brand-600/20 flex items-center justify-center text-brand-400 text-sm font-bold">1</div>
                  <div className="flex-1 h-1 rounded bg-gray-800"><div className="h-1 rounded bg-brand-500" style={{ width: '14%' }} /></div>
                  <span className="text-xs text-gray-500">Step 1 of 7</span>
                </div>
                <h2 className="text-xl font-bold text-white mb-1">Let's personalize your experience</h2>
                <p className="text-sm text-gray-400 mb-6">This helps us tailor recommendations to your situation.</p>

                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1 block">Your Name *</label>
                    <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Yuri Kruman"
                      className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all" />
                  </div>
                  <div>
                    <label className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1 block">Email (optional)</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="for export & backup"
                      className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all" />
                  </div>
                  <div>
                    <label className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1 block">Your Role</label>
                    <div className="grid grid-cols-2 gap-2">
                      {ROLES.map(r => (
                        <button key={r} onClick={() => setRole(r)}
                          className={`px-3 py-2 rounded-lg text-xs text-left transition-all ${role === r ? 'bg-brand-600/30 border-brand-500 text-brand-300' : 'bg-white/5 border-white/10 text-gray-400 hover:bg-white/10'} border`}>
                          {r}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1 block">Industry</label>
                    <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto">
                      {INDUSTRIES.map(ind => (
                        <button key={ind} onClick={() => setIndustry(ind)}
                          className={`px-3 py-2 rounded-lg text-xs text-left transition-all ${industry === ind ? 'bg-brand-600/30 border-brand-500 text-brand-300' : 'bg-white/5 border-white/10 text-gray-400 hover:bg-white/10'} border`}>
                          {ind}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="flex gap-3 mt-6">
                  <button onClick={() => fadeTo(0)} className="px-4 py-3 rounded-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-all text-sm">← Back</button>
                  <button onClick={() => canProceed && fadeTo(2)} disabled={!canProceed}
                    className={`flex-1 px-4 py-3 rounded-xl font-bold text-white transition-all ${canProceed ? 'bg-brand-600 hover:bg-brand-500' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                    Next →
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Step 2: Track selection — soft framing, not binary
      if (step === 2) {
        const trackOptions = [
          { id: 'operator', emoji: '🏢', label: 'Becoming my company\'s AI champion', subtitle: 'Lead transformation from the inside — build AI workflows, get buy-in, upskill your team', color: '#5c7cfa' },
          { id: 'founder', emoji: '🚀', label: 'Building something of my own', subtitle: 'Go fractional, start consulting, build a side venture — AI as your competitive edge', color: '#ff6b35' },
          { id: 'operator', emoji: '🤔', label: 'Honestly? Both. I want to explore.', subtitle: 'Start with the AI champion path — we\'ll unlock more as you discover what excites you', color: '#2a9d8f', isBoth: true },
        ];

        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%)' }}>
            <div className={`max-w-md w-full transition-all duration-300 ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
              <div className="glass-card p-8">
                <div className="flex items-center gap-2 mb-6">
                  <div className="w-8 h-8 rounded-lg bg-brand-600/20 flex items-center justify-center text-brand-400 text-sm font-bold">2</div>
                  <div className="flex-1 h-1 rounded bg-gray-800"><div className="h-1 rounded bg-brand-500" style={{ width: '25%' }} /></div>
                  <span className="text-xs text-gray-500">Step 2 of 8</span>
                </div>
                <h2 className="text-xl font-bold text-white mb-1">What excites you most right now?</h2>
                <p className="text-sm text-gray-400 mb-6">This shapes your journey. You can always switch later.</p>

                <div className="space-y-3">
                  {trackOptions.map((opt, i) => (
                    <button key={i} onClick={() => { setSelectedTrack(opt.id); }}
                      className={`w-full px-4 py-4 rounded-xl text-left transition-all border ${
                        selectedTrack === opt.id && (opt.isBoth ? selectedTrack === 'operator' : true)
                          ? 'border-opacity-60 bg-opacity-20'
                          : 'border-white/10 bg-white/5 hover:bg-white/10'
                      }`}
                      style={selectedTrack === opt.id ? { borderColor: opt.color, background: `${opt.color}12` } : {}}>
                      <div className="flex items-start gap-3">
                        <span className="text-2xl">{opt.emoji}</span>
                        <div>
                          <p className={`text-sm font-semibold ${selectedTrack === opt.id ? 'text-white' : 'text-gray-300'}`}>{opt.label}</p>
                          <p className="text-xs text-gray-500 mt-1">{opt.subtitle}</p>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>

                <div className="flex gap-3 mt-6">
                  <button onClick={() => fadeTo(1)} className="px-4 py-3 rounded-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-all text-sm">← Back</button>
                  <button onClick={() => selectedTrack && fadeTo(3)} disabled={!selectedTrack}
                    className={`flex-1 px-4 py-3 rounded-xl font-bold text-white transition-all ${selectedTrack ? 'bg-brand-600 hover:bg-brand-500' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                    Next: Quick Assessment →
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Steps 3-7: Mini-scorecard questions (one per dimension)
      if (step >= 3 && step <= 7) {
        const qIndex = step - 3;
        const q = MINI_SCORECARD[qIndex];
        const dim = SCORECARD_DIMENSIONS[q.dimIndex];
        const currentAnswer = miniAnswers[q.id];
        const progressPct = Math.round(((step) / 8) * 100);

        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%)' }}>
            <div className={`max-w-md w-full transition-all duration-300 ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
              <div className="glass-card p-8">
                <div className="flex items-center gap-2 mb-6">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold"
                    style={{ background: `${dim.color}20`, color: dim.color }}>{step}</div>
                  <div className="flex-1 h-1 rounded bg-gray-800"><div className="h-1 rounded transition-all duration-500" style={{ width: `${progressPct}%`, background: dim.color }} /></div>
                  <span className="text-xs text-gray-500">Step {step} of 8</span>
                </div>

                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full" style={{ background: dim.color }} />
                  <span className="text-xs font-medium uppercase tracking-wider" style={{ color: dim.color }}>{dim.name}</span>
                </div>
                <h2 className="text-lg font-bold text-white mb-6">{q.text}</h2>

                {q.type === 'slider' ? (
                  <div className="space-y-4">
                    <input type="range" min={q.min} max={q.max} value={currentAnswer || 50}
                      onChange={e => setMiniAnswers(prev => ({ ...prev, [q.id]: parseInt(e.target.value) }))}
                      className="w-full" />
                    <div className="flex justify-between text-[10px] text-gray-500">
                      <span>{q.labels[0]}</span>
                      <span className="text-lg font-bold text-white">{currentAnswer !== undefined ? currentAnswer : 50}%</span>
                      <span>{q.labels[1]}</span>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {q.options.map(opt => (
                      <button key={opt.value} onClick={() => setMiniAnswers(prev => ({ ...prev, [q.id]: opt.value }))}
                        className={`w-full px-4 py-3 rounded-xl text-left text-sm transition-all border ${currentAnswer === opt.value
                          ? 'border-opacity-60 bg-opacity-20 text-white font-medium'
                          : 'border-white/10 bg-white/5 text-gray-400 hover:bg-white/10'}`}
                        style={currentAnswer === opt.value ? { borderColor: dim.color, background: `${dim.color}15`, color: '#fff' } : {}}>
                        {opt.label}
                      </button>
                    ))}
                  </div>
                )}

                <div className="flex gap-3 mt-6">
                  <button onClick={() => fadeTo(step - 1)} className="px-4 py-3 rounded-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-all text-sm">←</button>
                  <button onClick={() => currentAnswer !== undefined && fadeTo(step + 1)}
                    disabled={currentAnswer === undefined}
                    className={`flex-1 px-4 py-3 rounded-xl font-bold text-white transition-all ${currentAnswer !== undefined ? 'hover:opacity-90' : 'opacity-40 cursor-not-allowed'}`}
                    style={{ background: currentAnswer !== undefined ? dim.color : '#333' }}>
                    {step === 7 ? 'See My Score →' : 'Next →'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Step 8: Results reveal
      if (step === 8) {
        const level = getScoreLevel(miniScore);
        const dimBreakdown = MINI_SCORECARD.map(q => {

      const catColors = { C: '#e63946', A: '#f4a261', E: '#2d6a4f' };

              <div className="text-right">

                <p className="text-xs text-gray-500">{tlr >= 60 ? 'Strong' : tlr >= 40 ? 'Developing' : 'At Risk'}</p>
              </div>
            </div>
            <div className="mt-3">

                          className={`w-7 h-7 rounded-lg text-xs font-bold transition-all ${task.category === cat ? 'text-white' : 'text-gray-600 hover:text-gray-400'}`}

            </div>

    const MoneyOSTool = () => {
      const { data, updateData } = useApp();
      const answers = data.moneyOS.answers || {};

      const handleAnswer = (key, value) => {
        updateData('moneyOS.answers', { ...answers, [key]: value });
      };

      const monthlyIncome = parseFloat(answers.monthlyIncome) || 0;
      const monthlyExpenses = parseFloat(answers.monthlyExpenses) || 0;
      const savings = parseFloat(answers.savings) || 0;
      const debt = parseFloat(answers.debt) || 0;
      const incomeStreams = parseInt(answers.incomeStreams) || 1;
      const largestStreamPct = parseFloat(answers.largestStreamPct) || 100;

      // Calculated metrics
      const monthlySurplus = monthlyIncome - monthlyExpenses;
      const runwayMonths = monthlyExpenses > 0 ? Math.round(savings / monthlyExpenses) : 0;
      const savingsRate = monthlyIncome > 0 ? Math.round((monthlySurplus / monthlyIncome) * 100) : 0;
      const debtToIncome = monthlyIncome > 0 ? Math.round((debt / (monthlyIncome * 12)) * 100) : 0;
      const diversificationScore = Math.max(0, 100 - largestStreamPct);

      // Money OS Level
      const getMoneyLevel = () => {
        let score = 0;
        if (runwayMonths >= 12) score += 25; else if (runwayMonths >= 6) score += 15; else if (runwayMonths >= 3) score += 8;
        if (savingsRate >= 30) score += 25; else if (savingsRate >= 20) score += 15; else if (savingsRate >= 10) score += 8;
        if (incomeStreams >= 4) score += 25; else if (incomeStreams >= 2) score += 15; else score += 5;
        if (diversificationScore >= 50) score += 25; else if (diversificationScore >= 30) score += 15; else score += 5;
        if (score >= 80) return { level: 'Fortress', color: '#2d6a4f', desc: 'Your finances are a fortress. Focus on growth.' };
        if (score >= 60) return { level: 'Stable', color: '#5c7cfa', desc: 'Solid foundation. Diversify and optimize.' };
        if (score >= 40) return { level: 'Building', color: '#f4a261', desc: 'Making progress. Reduce single-source dependency.' };
        if (score >= 20) return { level: 'Vulnerable', color: '#e63946', desc: 'Significant risk. Build runway and diversify immediately.' };
        return { level: 'Critical', color: '#ff0000', desc: 'Financial emergency mode. Stabilize before growing.' };
      };

      const moneyLevel = getMoneyLevel();
      const hasData = monthlyIncome > 0;

      return (
        <div className="fade-in space-y-6">
          <SectionHeader title="Money OS Dashboard" subtitle="Your personal financial operating system — runway, diversification, and resilience" />

    const SKILLS_EDGE_LEVELS = [

    const SkillsEdgeTool = () => {
      const { data, updateData } = useApp();
      const answers = data.skillsEdge?.answers || {};

      const handleAnswer = (skillId, value) => {
        updateData('skillsEdge.answers', { ...answers, [skillId]: value });
      };

      const ratingOptions = [
        { label: 'Not at all', value: 0, color: '#e63946' },
        { label: 'Somewhat', value: 1, color: '#f4a261' },

      // Calculate level scores
      const levelScores = SKILLS_EDGE_LEVELS.map(level => {
        let maxScore = 0;
        let earnedScore = 0;
        level.skills.forEach(skill => {
          maxScore += 3 * skill.weight;
          if (answers[skill.id] !== undefined) {
            earnedScore += answers[skill.id] * skill.weight;
          }
        });
        return { ...level, score: maxScore > 0 ? Math.round((earnedScore / maxScore) * 100) : 0, answered: level.skills.filter(s => answers[s.id] !== undefined).length };
      });

      const overallScore = levelScores.reduce((s, l) => s + l.score, 0) / 3;
      const currentTier = levelScores[0].score >= 60 ? (levelScores[1].score >= 60 ? (levelScores[2].score >= 60 ? 'Orchestrator' : 'Workflow Pro') : 'AI Literate') : 'Beginner';
      const tierColors = { Beginner: '#e63946', 'AI Literate': '#f4a261', 'Workflow Pro': '#5c7cfa', Orchestrator: '#2d6a4f' };

      return (

          <SectionHeader title="AI Skills Edge Pyramid" subtitle="Assess your AI capability across 3 tiers: Literacy → Workflow → Orchestration" />

            <p className="text-xs text-gray-400 uppercase tracking-wider">Your AI Skills Tier</p>
            <h2 className="text-3xl font-bold mt-2" style={{ color: tierColors[currentTier] }}>{currentTier}</h2>
            <p className="text-sm text-gray-400 mt-1">Overall proficiency: {Math.round(overallScore)}%</p>
            <div className="flex justify-center gap-6 mt-4">
              {levelScores.map(ls => (
                <div key={ls.id}>
                  <div className="relative inline-flex items-center justify-center">

                  </div>
                  <p className="text-xs text-gray-400 mt-1">{ls.label}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Assessment by tier */}
          {SKILLS_EDGE_LEVELS.map((level, li) => {
            const ls = levelScores[li];
            return (
              <div key={level.id} className="glass-card p-6" style={{ borderColor: `${level.color}30` }}>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <h3 className="text-lg font-bold text-white flex items-center gap-2">
                      <span className="w-3 h-3 rounded-full" style={{ background: level.color }} />
                      Tier {level.tier}: {level.label}
                    </h3>
                    <p className="text-sm text-gray-400">{level.description}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-2xl font-bold" style={{ color: level.color }}>{ls.score}%</p>
                    <p className="text-xs text-gray-500">{ls.answered}/{level.skills.length} rated</p>
                  </div>
                </div>

                <div className="space-y-4">
                  {level.skills.map(skill => (

                      <div className="flex gap-2">

                            style={answers[skill.id] === opt.value ? { background: `${opt.color}30`, color: opt.color, border: `1px solid ${opt.color}50` } : { background: 'rgba(255,255,255,0.03)', border: '1px solid transparent' }}>

    // ============================================================
    // TOOL 8: REPLACEABILITY DIAGNOSTIC
    // ============================================================

    const REPLACEABILITY_QUESTIONS = [
      { id: 'r1', text: 'Could a well-prompted AI produce 80%+ of your written output (emails, reports, memos)?', weight: 1.2, category: 'output' },
      { id: 'r2', text: 'Does your role require navigating ambiguous, high-stakes situations with no playbook?', weight: 1.5, category: 'judgment', inverted: true },
      { id: 'r3', text: 'Could someone watch recordings of your meetings and replicate your contributions?', weight: 1.0, category: 'output' },
      { id: 'r4', text: 'Do you rely on relationships and trust built over years that a new person couldn\'t replicate quickly?', weight: 1.3, category: 'tacit', inverted: true },
      { id: 'r5', text: 'Is your work primarily following documented processes or checklists?', weight: 1.2, category: 'output' },
      { id: 'r6', text: 'Do you make decisions that could cost or save the company $100K+ based on gut instinct?', weight: 1.5, category: 'judgment', inverted: true },
      { id: 'r7', text: 'Could your role be split into 3-4 tasks and distributed to AI + junior staff?', weight: 1.3, category: 'output' },
      { id: 'r8', text: 'Are you the only person who understands how certain critical systems/processes actually work?', weight: 1.2, category: 'tacit', inverted: true },
      { id: 'r9', text: 'Do clients/stakeholders specifically request YOU (not just anyone in your role)?', weight: 1.4, category: 'tacit', inverted: true },
      { id: 'r10', text: 'If AI could do your job 70% as well for 10% of the cost, would your employer switch?', weight: 1.5, category: 'output' },
    ];

    const ReplaceabilityTool = () => {
      const { data, updateData } = useApp();
      const answers = data.replaceability?.answers || {};

      const handleAnswer = (qId, value) => {
        updateData('replaceability.answers', { ...answers, [qId]: value });
      };

      const options = [
        { label: 'Strongly disagree', value: 1 },
        { label: 'Disagree', value: 2 },
        { label: 'Neutral', value: 3 },
        { label: 'Agree', value: 4 },
        { label: 'Strongly agree', value: 5 },
      ];

      // Calculate replaceability score (0-100, higher = MORE replaceable = worse)
      const answered = REPLACEABILITY_QUESTIONS.filter(q => answers[q.id] !== undefined);
      let weightedSum = 0, totalWeight = 0;
      answered.forEach(q => {
        const raw = answers[q.id];
        const normalized = q.inverted ? (6 - raw) : raw; // Inverted means high agreement = LOW replaceability
        weightedSum += (normalized / 5) * q.weight;
        totalWeight += q.weight;
      });
      const replaceabilityScore = totalWeight > 0 ? Math.round((weightedSum / totalWeight) * 100) : 0;
      const shieldScore = 100 - replaceabilityScore;

      const getVerdict = () => {
        if (shieldScore >= 80) return { label: 'Irreplaceable', color: '#2d6a4f', desc: 'Your combination of judgment, relationships, and tacit knowledge makes you extremely hard to replace.' };
        if (shieldScore >= 60) return { label: 'Defensible', color: '#5c7cfa', desc: 'You have strong protective factors but some vulnerability in routine task areas.' };
        if (shieldScore >= 40) return { label: 'Vulnerable', color: '#f4a261', desc: 'Significant portions of your role could be automated or redistributed. Act now.' };
        if (shieldScore >= 20) return { label: 'At Risk', color: '#e63946', desc: 'Most of your current value proposition is replicable by AI + junior talent. Urgently reposition.' };
        return { label: 'Critical', color: '#ff0000', desc: 'Your role is highly automatable. Immediate action required to build irreplaceable value.' };
      };

      const verdict = getVerdict();

      // Category breakdown
      const categories = { output: { label: 'Output Replaceability', color: '#e63946' }, judgment: { label: 'Judgment Shield', color: '#5c7cfa' }, tacit: { label: 'Tacit Knowledge Shield', color: '#2d6a4f' } };
      const catScores = {};
      Object.keys(categories).forEach(cat => {
        const qs = REPLACEABILITY_QUESTIONS.filter(q => q.category === cat && answers[q.id] !== undefined);
        if (qs.length === 0) { catScores[cat] = 0; return; }
        let ws = 0, tw = 0;
        qs.forEach(q => {
          const raw = answers[q.id];
          const norm = q.inverted ? (6 - raw) : raw;
          ws += ((6 - norm) / 5) * q.weight; // Invert so higher = better shield
          tw += q.weight;
        });
        catScores[cat] = tw > 0 ? Math.round((ws / tw) * 100) : 0;
      });

      return (
        <div className="fade-in space-y-6">
          <SectionHeader title="Am I Replaceable? — Diagnostic" subtitle="Honest assessment of how vulnerable your role is to AI + restructuring" />

          {/* Result */}
          {answered.length > 0 && (
            <div className="glass-card p-6 text-center" style={{ borderColor: `${verdict.color}40` }}>
              <p className="text-xs text-gray-400 uppercase tracking-wider">Your Irreplaceability Shield</p>
              <div className="relative inline-flex items-center justify-center my-4">
                <ScoreRing score={shieldScore} maxScore={100} size={140} strokeWidth={9} color={verdict.color} />
              </div>
              <h2 className="text-2xl font-bold" style={{ color: verdict.color }}>{verdict.label}</h2>
              <p className="text-sm text-gray-400 mt-2 max-w-lg mx-auto">{verdict.desc}</p>

              <div className="flex justify-center gap-6 mt-6">
                {Object.entries(categories).map(([key, cat]) => (
                  <div key={key}>
                    <p className="text-xl font-bold" style={{ color: cat.color }}>{catScores[key]}%</p>
                    <p className="text-xs text-gray-500">{cat.label}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Questions */}
          <div className="glass-card p-6">
            <p className="text-sm font-medium text-white mb-4">Rate each statement honestly ({answered.length}/{REPLACEABILITY_QUESTIONS.length})</p>
            <div className="space-y-4">
              {REPLACEABILITY_QUESTIONS.map((q, qi) => (
                <div key={q.id} className="glass rounded-xl p-4">
                  <p className="text-sm text-gray-200 mb-3">
                    <span className="text-gray-500 mr-2">{qi + 1}.</span>{q.text}
                  </p>
                  <div className="flex gap-1.5">
                    {options.map(opt => (
                      <button key={opt.value} onClick={() => handleAnswer(q.id, opt.value)}
                        className={`flex-1 py-2 rounded-lg text-[11px] font-medium transition-all ${answers[q.id] === opt.value ? 'text-white bg-brand-600/30 border border-brand-500/50' : 'text-gray-500 bg-white/3 hover:bg-white/5 border border-transparent'}`}>
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================

    // ============================================================

    const RoleErosionTool = () => {

                {/* Milestones plotted */}
                <div className="space-y-3">
                  {milestones.map(m => {
                    const cat = categories.find(c => c.id === m.category) || categories[0];

                    return (
                      <div key={m.id} className="flex items-center gap-3 group" style={{ paddingLeft: `${tf.position}%` }}>

                            <p className="text-sm font-medium text-white">{m.title}</p>
                            <span className="px-1.5 py-0.5 rounded text-[9px] font-bold" style={{ background: `${imp.color}20`, color: imp.color }}>{m.impact.toUpperCase()}</span>
                          </div>
                          {m.description && <p className="text-xs text-gray-500 mt-1">{m.description}</p>}
                          <span className="text-[10px] mt-1 inline-block" style={{ color: cat.color }}>{cat.label}</span>
                        </div>
                        <button onClick={() => deleteMilestone(m.id)} className="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 text-xs">✕</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Summary */}
          {milestones.length > 0 && (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">

              <StatCard title="Threats" value={threats.length} icon="⚠" color="#e63946" />
              <StatCard title="Opportunities" value={opportunities.length} icon="★" color="#2d6a4f" />
              <StatCard title="Critical Items" value={milestones.filter(m => m.impact === 'critical').length} icon="!" color="#ff0000" />
            </div>
          )}

          {milestones.length === 0 && !showForm && (
            <div className="glass-card p-12 text-center">
              <p className="text-gray-400 mb-4">Map upcoming threats and opportunities on your career timeline.</p>
              <Button onClick={() => setShowForm(true)}>+ Add Your First Event</Button>
            </div>
          )}

          {/* Add form */}
          {showForm && (
            <div className="glass-card p-6 glow">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-lg font-bold text-white">Add Timeline Event</h3>
                <Button variant="ghost" size="sm" onClick={() => setShowForm(false)}>Cancel</Button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Event Title</label>
                  <input type="text" value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })}
                    placeholder="e.g., 'AI writing tools replace 50% of content work'"
                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500" />

                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Description</label>
                  <input type="text" value={form.description} onChange={(e) => setForm({ ...form, description: e.target.value })}

      { id: 'b2', text: 'I dread Monday mornings', weight: 1.0, category: 'exhaustion' },

    ];

    const BurnoutScannerTool = () => {
      const { data, updateData } = useApp();
      const answers = data.burnout?.answers || {};

      const handleAnswer = (id, value) => updateData('burnout.answers', { ...answers, [id]: value });

      const options = [
        { label: 'Never', value: 0, color: '#2d6a4f' },
        { label: 'Rarely', value: 1, color: '#5c7cfa' },
        { label: 'Sometimes', value: 2, color: '#f4a261' },
        { label: 'Often', value: 3, color: '#e63946' },
        { label: 'Always', value: 4, color: '#ff0000' },
      ];

      const answered = BURNOUT_QUESTIONS.filter(q => answers[q.id] !== undefined);
      let totalWeight = 0, weightedSum = 0;
      answered.forEach(q => { totalWeight += q.weight; weightedSum += (answers[q.id] / 4) * q.weight; });
      const riskScore = totalWeight > 0 ? Math.round((weightedSum / totalWeight) * 100) : 0;

      const getVerdict = () => {
        if (riskScore >= 75) return { label: 'Critical Burnout', color: '#ff0000', desc: 'You are likely experiencing burnout. Consider speaking to a professional and making immediate changes.' };
        if (riskScore >= 55) return { label: 'High Risk', color: '#e63946', desc: 'Multiple burnout indicators are elevated. Take action before it gets worse.' };
        if (riskScore >= 35) return { label: 'Moderate Risk', color: '#f4a261', desc: 'Some warning signs present. Monitor closely and address stressors.' };
        if (riskScore >= 15) return { label: 'Low Risk', color: '#5c7cfa', desc: 'Minor stress indicators. Maintain current self-care habits.' };
        return { label: 'Thriving', color: '#2d6a4f', desc: 'You appear to be in a healthy work state. Keep it up.' };
      };

      const verdict = getVerdict();
      const categories = { exhaustion: { label: 'Emotional Exhaustion', color: '#e63946' }, cynicism: { label: 'Cynicism & Detachment', color: '#f4a261' }, inefficacy: { label: 'Reduced Efficacy', color: '#5c7cfa' } };

      const catScores = {};
      Object.keys(categories).forEach(cat => {
        const qs = BURNOUT_QUESTIONS.filter(q => q.category === cat && answers[q.id] !== undefined);
        if (qs.length === 0) { catScores[cat] = 0; return; }
        let ws = 0, tw = 0;
        qs.forEach(q => { tw += q.weight; ws += (answers[q.id] / 4) * q.weight; });
        catScores[cat] = tw > 0 ? Math.round((ws / tw) * 100) : 0;
      });

      return (
        <div className="fade-in space-y-6">
          <SectionHeader title="Burnout Risk Scanner" subtitle="Assess your burnout risk across 3 dimensions: Exhaustion, Cynicism, and Efficacy" />

          {answered.length > 0 && (
            <div className="glass-card p-6 text-center" style={{ borderColor: `${verdict.color}40` }}>
              <p className="text-xs text-gray-400 uppercase tracking-wider">Burnout Risk Level</p>
              <div className="relative inline-flex items-center justify-center my-4">
                <ScoreRing score={riskScore} maxScore={100} size={130} strokeWidth={9} color={verdict.color} />
              </div>
              <h2 className="text-2xl font-bold" style={{ color: verdict.color }}>{verdict.label}</h2>
              <p className="text-sm text-gray-400 mt-2 max-w-lg mx-auto">{verdict.desc}</p>
              <div className="flex justify-center gap-6 mt-4">
                {Object.entries(categories).map(([key, cat]) => (
                  <div key={key}>
                    <p className="text-xl font-bold" style={{ color: catScores[key] >= 50 ? cat.color : '#5c7cfa' }}>{catScores[key]}%</p>
                    <p className="text-xs text-gray-500">{cat.label}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="glass-card p-6">
            <p className="text-sm font-medium text-white mb-4">Rate how often you experience each ({answered.length}/{BURNOUT_QUESTIONS.length})</p>
            <div className="space-y-3">
              {BURNOUT_QUESTIONS.map((q, qi) => (
                <div key={q.id} className="glass rounded-xl p-4">
                  <p className="text-sm text-gray-200 mb-3"><span className="text-gray-500 mr-2">{qi + 1}.</span>{q.text}</p>
                  <div className="flex gap-1">
                    {options.map(opt => (
                      <button key={opt.value} onClick={() => handleAnswer(q.id, opt.value)}
                        className={`flex-1 py-2 rounded-lg text-[11px] font-medium transition-all ${answers[q.id] === opt.value ? 'text-white' : 'text-gray-500'}`}
                        style={answers[q.id] === opt.value ? { background: `${opt.color}30`, color: opt.color, border: `1px solid ${opt.color}50` } : { background: 'rgba(255,255,255,0.03)', border: '1px solid transparent' }}>

                    ))}

      );
    };

    const FreelanceRateTool = () => {
      const { data, updateData } = useApp();
      const inputs = data.freelanceRate?.inputs || {};
      const setInput = (key, val) => updateData('freelanceRate.inputs', { ...inputs, [key]: val });

      // Rate calculation engine
      const targetIncome = parseFloat(inputs.targetAnnual) || 0;
      const workWeeks = parseFloat(inputs.workWeeks) || 48;
      const billableHours = parseFloat(inputs.billableHoursPerWeek) || 25;
      const overheadPct = parseFloat(inputs.overhead) || 30;
      const profitMargin = parseFloat(inputs.profitMargin) || 20;

      const totalBillableHours = workWeeks * billableHours;
      const withOverhead = targetIncome * (1 + overheadPct / 100);
      const withProfit = withOverhead * (1 + profitMargin / 100);
      const hourlyRate = totalBillableHours > 0 ? Math.round(withProfit / totalBillableHours) : 0;
      const dailyRate = hourlyRate * 8;
      const weeklyRate = hourlyRate * billableHours;
      const projectRate = hourlyRate * 40; // 1-week project
      const retainerRate = Math.round(weeklyRate * 4 * 0.85); // Monthly retainer w/ 15% discount

      const handleSave = () => {
        updateData('freelanceRate', { ...data.freelanceRate, hourlyRate, projectRate: projectRate.toString(), retainerRate: retainerRate.toString(), inputs, completedAt: new Date().toISOString() });
      };

      return (
        <div className="fade-in space-y-6">
          <SectionHeader title="Freelance Rate Calculator" subtitle="Price your expertise to close the AI Wage Gap — stop trading time for money at a discount" />

                  <label className="text-xs text-gray-400 mb-1 block">{field.label}</label>
                  <input type="number" value={inputs[field.key] || ''} onChange={e => setInput(field.key, e.target.value)}

                    className="w-full px-4 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-600 focus:border-brand-500 outline-none" />
                </div>
              ))}

                <StatCard title="Daily" value={`$${dailyRate}`} subtitle="8hr day" icon="⊘" color="#5c7cfa" />
                <StatCard title="Weekly" value={`$${weeklyRate.toLocaleString()}`} subtitle={`${billableHours}hr week`} icon="⊘" color="#f4a261" />
                <StatCard title="Retainer" value={`$${retainerRate.toLocaleString()}`} subtitle="monthly (15% off)" icon="⊘" color="#ff6b35" />
              </div>

        return Math.round(answered.reduce((s, q) => s + answers[q.id], 0) / (qs.length * 3) * 100);

      const totalScore = pillars.reduce((s, p) => s + getPillarScore(p), 0) / 4;
      const hasAnswers = Object.keys(answers).length > 0;

      return (

    const IMPORT_SOURCES = [
      { id: 'linkedin', label: 'LinkedIn', icon: '💼', color: '#0077b5',

      },

          'Click "Export" → "Details Only" → CSV',
          'Upload the exported CSV here',
        ],
        fields: { firstName: 'First Name', lastName: 'Last Name', email: 'Email', company: 'Account Name', position: 'Title' }
      },

          'Click "Export" (top-right)',
          'Select CSV format and your properties',
          'Upload the exported file here',
        ],
        fields: { firstName: 'First name', lastName: 'Last name', email: 'Email', company: 'Company name', position: 'Job title' }
      },
      { id: 'csv', label: 'Generic CSV', icon: '📋', color: '#666',
        steps: [
          'Prepare a CSV with columns: Name, Email, Company, Title',

          'Upload the CSV file here',
        ],
        fields: { firstName: 'Name', email: 'Email', company: 'Company', position: 'Title' }
      },
    ];

    const ContactImportView = () => {
      const { data, updateData } = useApp();
      const [selectedSource, setSelectedSource] = useState(null);
      const [importPreview, setImportPreview] = useState(null);
      const [importing, setImporting] = useState(false);
      const importHistory = data.careerAssets?.importHistory || [];
      const fileInputRef = useRef(null);

      // Parse CSV text into array of objects
      const parseCSV = (text) => {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        return lines.slice(1).map(line => {
          // Handle quoted fields with commas
          const values = [];
          let current = '';
          let inQuotes = false;
          for (const char of line) {
            if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
            else { current += char; }
          }
          values.push(current.trim());
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/^"|"$/g, ''); });
          return obj;
        });
      };

      // Map source fields to CRM contact format
      const mapToContacts = (rows, source) => {
        const fields = source.fields;
        return rows.map(row => {
          const firstName = row[fields.firstName] || '';
          const lastName = row[fields.lastName] || '';
          const name = fields.firstName === 'Name' ? firstName : `${firstName} ${lastName}`.trim();
          return {
            id: Date.now() + Math.random(),
            name: name,
            email: row[fields.email] || '',
            company: row[fields.company] || '',
            title: row[fields.position] || '',
            category: 'peer',
            strength: 2,
            lastContact: row[fields.connectedOn] ? new Date(row[fields.connectedOn]).toISOString().split('T')[0] : '',
            notes: `Imported from ${source.label}`,
            tags: [source.id],
            importedFrom: source.id,
          };
        }).filter(c => c.name && c.name.trim());
      };

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const rows = parseCSV(evt.target.result);
          const source = IMPORT_SOURCES.find(s => s.id === selectedSource) || IMPORT_SOURCES[5];
          const contacts = mapToContacts(rows, source);
          setImportPreview({ total: rows.length, contacts: contacts, source: source });
        };
        reader.readAsText(file);
      };

      const executeImport = () => {
        if (!importPreview) return;
        setImporting(true);
        const existingContacts = data.crm?.contacts || [];
        const existingNames = new Set(existingContacts.map(c => c.name.toLowerCase()));
        const newContacts = importPreview.contacts.filter(c => !existingNames.has(c.name.toLowerCase()));
        const allContacts = [...existingContacts, ...newContacts];
        updateData('crm.contacts', allContacts);

        // Log import
        const history = data.careerAssets?.importHistory || [];
        updateData('careerAssets.importHistory', [...history, {
          id: Date.now(),
          source: importPreview.source.label,
          count: newContacts.length,
          skipped: importPreview.contacts.length - newContacts.length,
          importedAt: new Date().toISOString(),
        }]);

        setImporting(false);
        setImportPreview({ ...importPreview, imported: true, newCount: newContacts.length, skippedCount: importPreview.contacts.length - newContacts.length });
      };

      return (
        <div className="fade-in space-y-6">
          <div className="glass-card p-6 glow">
            <h1 className="text-2xl font-bold text-white">Contact Import</h1>
            <p className="text-gray-400 text-sm mt-1">Import your professional contacts from LinkedIn, Gmail, Outlook, Salesforce, HubSpot, or any CSV into your Mini-CRM.</p>
          </div>

          {/* Source selector */}
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {IMPORT_SOURCES.map(source => (
              <button key={source.id} onClick={() => { setSelectedSource(source.id); setImportPreview(null); }}
                className={`glass-card p-4 text-center hover:bg-white/5 transition-all ${selectedSource === source.id ? 'ring-1' : ''}`}
                style={selectedSource === source.id ? { borderColor: source.color } : {}}>
                <span className="text-2xl block mb-2">{source.icon}</span>
                <p className="text-sm font-bold text-white">{source.label}</p>
              </button>
            ))}
          </div>

          {/* Instructions + upload */}
          {selectedSource && (() => {
            const source = IMPORT_SOURCES.find(s => s.id === selectedSource);
            return (
              <div className="glass-card p-6">
                <h3 className="text-sm font-bold text-white mb-3" style={{ color: source.color }}>
                  {source.icon} How to Export from {source.label}
                </h3>
                <ol className="text-xs text-gray-400 space-y-2 list-decimal list-inside mb-4">
                  {source.steps.map((step, i) => (
                    <li key={i}><span className="text-gray-300">{step}</span></li>
                  ))}
                </ol>

                <div className="border-2 border-dashed border-white/10 rounded-xl p-6 text-center cursor-pointer hover:border-white/20 transition-all"
                  onClick={() => fileInputRef.current?.click()}>
                  <input ref={fileInputRef} type="file" accept=".csv" className="hidden" onChange={handleFileSelect} />
                  <span className="text-2xl block mb-2">📂</span>
                  <p className="text-sm text-gray-400">Drop your <strong className="text-white">.csv</strong> file here or <strong className="text-brand-400">click to browse</strong></p>
                </div>
              </div>
            );
          })()}

          {/* Import preview */}
          {importPreview && !importPreview.imported && (
            <div className="glass-card p-6">
              <h3 className="text-sm font-bold text-white mb-3">Preview: {importPreview.contacts.length} contacts found</h3>
              <div className="max-h-48 overflow-y-auto space-y-1 mb-4">
                {importPreview.contacts.slice(0, 20).map((c, i) => (
                  <div key={i} className="flex items-center gap-3 text-xs py-1 border-b border-white/5">
                    <span className="text-white font-medium w-40 truncate">{c.name}</span>
                    <span className="text-gray-500 w-32 truncate">{c.company}</span>
                    <span className="text-gray-600 truncate">{c.email}</span>
                  </div>
                ))}
                {importPreview.contacts.length > 20 && (
                  <p className="text-[10px] text-gray-600">...and {importPreview.contacts.length - 20} more</p>
                )}
              </div>
              <Button onClick={executeImport}>
                Import {importPreview.contacts.length} Contacts to CRM
              </Button>
            </div>
          )}

          {/* Import success */}
          {importPreview?.imported && (
            <div className="glass-card p-6 text-center" style={{ borderColor: '#2d6a4f30', borderWidth: '1px' }}>
              <span className="text-3xl block mb-2">✅</span>
              <h3 className="text-lg font-bold text-white mb-1">Import Complete!</h3>
              <p className="text-sm text-gray-400">
                <strong className="text-green-400">{importPreview.newCount}</strong> new contacts added
                {importPreview.skippedCount > 0 && (
                  <span> • <strong className="text-yellow-400">{importPreview.skippedCount}</strong> duplicates skipped</span>
                )}
              </p>
              <button onClick={() => { setImportPreview(null); setSelectedSource(null); }}
                className="mt-3 text-xs text-brand-400 hover:text-brand-300">Import more →</button>
            </div>
          )}

          {/* Import history */}
          {importHistory.length > 0 && (
            <div className="glass-card p-5">
              <h3 className="text-sm font-bold text-white mb-3">Import History</h3>
              {importHistory.map(h => (
                <div key={h.id} className="flex items-center justify-between py-2 border-b border-white/5 last:border-0">
                  <div>
                    <p className="text-xs font-medium text-white">{h.source}</p>
                    <p className="text-[10px] text-gray-500">{new Date(h.importedAt).toLocaleDateString()}</p>
                  </div>
                  <p className="text-xs text-green-400 font-bold">+{h.count} contacts</p>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ============================================================
